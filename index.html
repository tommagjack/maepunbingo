<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบขานเลขบิงโกอัตโนมัติ (Bingo Caller)</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #111827;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --card-bg: #1f2937;
            --green-active: #4ade80;
            --green-dark: #064e3b;
            --btn-start: #3b82f6;
            --btn-stop: #ef4444;
            --btn-reset: #f59e0b;
            --btn-full: #8b5cf6;
            --btn-bingo: #ec4899;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Kanit', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Header & Main Display */
        .header {
            text-align: center;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1000px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: var(--green-active);
        }

        .number-display {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 600px;
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 4px solid #374151;
            transition: all 0.3s ease;
        }

        .number-display.active {
            border-color: var(--green-active);
            box-shadow: 0 0 40px rgba(74, 222, 128, 0.3);
        }

        .current-number {
            font-size: 160px;
            font-weight: 800;
            line-height: 1;
            color: var(--green-active);
            text-shadow: 0 0 20px rgba(74, 222, 128, 0.5);
        }

        .counter {
            font-size: 20px;
            color: var(--text-muted);
            margin-top: 15px;
            font-weight: 600;
        }

        .subtitle {
            font-size: 24px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }

        /* Controls */
        .controls-container {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: center;
            margin-bottom: 30px;
            width: 100%;
            max-width: 1000px;
        }

        .btn {
            font-size: 24px;
            font-weight: 600;
            padding: 15px 35px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-start { background-color: var(--btn-start); color: white; }
        .btn-stop { background-color: var(--btn-stop); color: white; }
        .btn-reset { background-color: var(--btn-reset); color: white; }
        .btn-full { background-color: var(--btn-full); color: white; }
        .btn-bingo { background-color: var(--btn-bingo); color: white; }

        .btn-start:hover:not(:disabled) { background-color: #2563eb; }
        .btn-stop:hover:not(:disabled) { background-color: #dc2626; }
        .btn-reset:hover:not(:disabled) { background-color: #d97706; }
        .btn-full:hover { background-color: #7c3aed; }
        .btn-bingo:hover:not(:disabled) { background-color: #db2777; }

        /* Header Controls & Speed */
        .header-controls {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .speed-controls {
            background-color: var(--card-bg);
            padding: 8px 15px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .speed-label {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-main);
        }

        .btn-speed {
            font-size: 16px;
            padding: 6px 15px;
            background-color: #374151;
            color: white;
            border: 2px solid transparent;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-speed.active {
            background-color: var(--green-active);
            color: var(--green-dark);
            border-color: white;
            font-weight: 800;
        }

        /* Adjust btn-full for header */
        .btn-full {
            font-size: 18px;
            padding: 10px 20px;
        }

        /* Bingo Grid */
        .grid-container {
            width: 100%;
            max-width: 1200px;
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
        }

        .bingo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(65px, 1fr));
            gap: 12px;
        }

        .cell {
            aspect-ratio: 1;
            background-color: #374151;
            color: var(--text-muted);
            font-size: 28px;
            font-weight: 600;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
        }

        .cell.called {
            background-color: var(--green-active);
            color: var(--green-dark);
            font-weight: 800;
            box-shadow: 0 0 15px rgba(74, 222, 128, 0.4);
            transform: scale(1.05);
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .current-number { font-size: 120px; }
            .btn { font-size: 20px; padding: 12px 25px; }
            .btn-full { font-size: 16px; padding: 10px 15px; width: 100%; justify-content: center; }
            .cell { font-size: 22px; }
            .bingo-grid { grid-template-columns: repeat(auto-fill, minmax(50px, 1fr)); }
            .header { flex-direction: column; gap: 15px; }
            .header-controls { flex-direction: column; gap: 10px; width: 100%; }
            .speed-controls { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>ระบบขานเลขบิงโก (1-75)</h1>
        <div class="header-controls">
            <div class="speed-controls">
                <span class="speed-label">ความเร็ว:</span>
                <button class="btn-speed" id="speed-slow" onclick="setSpeed('slow')">ช้า</button>
                <button class="btn-speed active" id="speed-normal" onclick="setSpeed('normal')">ปกติ</button>
                <button class="btn-speed" id="speed-fast" onclick="setSpeed('fast')">เร็ว</button>
            </div>
            <button class="btn btn-full" onclick="toggleFullscreen()">เต็มจอ</button>
        </div>
    </div>

    <div class="number-display" id="display-card">
        <div class="subtitle">หมายเลขที่ออก</div>
        <div class="current-number" id="current-number">-</div>
        <div class="counter" id="number-counter">ออกแล้ว 0 / 75</div>
    </div>

    <div class="controls-container">
        <button class="btn btn-start" id="btn-start" onclick="startAuto()">▶ เริ่มอัตโนมัติ</button>
        <button class="btn btn-stop" id="btn-stop" onclick="stopBingo()" disabled>⏸ หยุด</button>
        <button class="btn btn-reset" id="btn-reset" onclick="resetBingo()">↺ เริ่มรอบใหม่</button>
        <button class="btn btn-bingo" id="btn-bingo" onclick="announceBingo()" disabled>🎉 บิงโก!</button>
    </div>

    <div class="grid-container">
        <div class="bingo-grid" id="bingo-grid">
            <!-- Grid cells generated by JS -->
        </div>
    </div>

    <script>
        // State Management
        let availableNumbers = [];
        let calledNumbers = [];
        let isPlaying = false;
        
        // Settings
        const MAX_NUMBER = 75;
        const SPEEDS = {
            slow: { delay: 3500, rate: 0.65 },
            normal: { delay: 2000, rate: 0.75 },
            fast: { delay: 1000, rate: 0.9 }
        };
        let currentSpeed = SPEEDS.normal;

        // Async controls
        let timeoutId = null;
        let resolveSleep = null;
        let currentUtterance = null;

        // Initialize App
        function init() {
            resetBingo();
        }

        // Convert Number to Thai Words
        function numberToThai(num) {
            const units = ["", "หนึ่ง", "สอง", "สาม", "สี่", "ห้า", "หก", "เจ็ด", "แปด", "เก้า"];
            const tens = ["", "สิบ", "ยี่สิบ", "สามสิบ", "สี่สิบ", "ห้าสิบ", "หกสิบ", "เจ็ดสิบ", "แปดสิบ", "เก้าสิบ"];
            
            if (num < 10) return units[num];
            
            const tenDigit = Math.floor(num / 10);
            const unitDigit = num % 10;
            
            let text = tens[tenDigit];
            
            if (unitDigit === 1) {
                text += "เอ็ด";
            } else if (unitDigit > 1) {
                text += units[unitDigit];
            }
            
            if (num === 10) return "สิบ";
            
            return text;
        }

        // Setup Grid UI
        function renderGrid() {
            const grid = document.getElementById('bingo-grid');
            grid.innerHTML = '';
            for (let i = 1; i <= MAX_NUMBER; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.id = `cell-${i}`;
                cell.innerText = i;
                if (calledNumbers.includes(i)) {
                    cell.classList.add('called');
                }
                grid.appendChild(cell);
            }
        }

        // Update Counter UI
        function updateCounter() {
            document.getElementById('number-counter').innerText = `ออกแล้ว ${calledNumbers.length} / ${MAX_NUMBER}`;
        }

        // Update Buttons UI
        function updateUI() {
            document.getElementById('btn-start').disabled = isPlaying || availableNumbers.length === 0;
            document.getElementById('btn-stop').disabled = !isPlaying;
            document.getElementById('btn-bingo').disabled = calledNumbers.length === 0;
            
            const displayCard = document.getElementById('display-card');
            if (isPlaying) {
                displayCard.classList.add('active');
            } else {
                displayCard.classList.remove('active');
            }
        }

        // Set Speech Speed
        function setSpeed(type) {
            currentSpeed = SPEEDS[type];
            document.querySelectorAll('.btn-speed').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`speed-${type}`).classList.add('active');
        }

        // Promise-based sleep function (cancellable)
        function sleep(ms) {
            return new Promise(resolve => {
                resolveSleep = resolve;
                timeoutId = setTimeout(() => {
                    resolveSleep = null;
                    resolve();
                }, ms);
            });
        }

        function cancelSleep() {
            if (timeoutId) {
                clearTimeout(timeoutId);
                timeoutId = null;
            }
            if (resolveSleep) {
                resolveSleep();
                resolveSleep = null;
            }
        }

        // Promise-based Speech function
        function speak(text, rate) {
            return new Promise(resolve => {
                if (!('speechSynthesis' in window)) {
                    return resolve();
                }

                window.speechSynthesis.cancel(); // Cancel ongoing speech
                
                currentUtterance = new SpeechSynthesisUtterance(text);
                currentUtterance.lang = 'th-TH';
                currentUtterance.rate = rate;
                
                currentUtterance.onend = () => {
                    currentUtterance = null;
                    resolve();
                };
                
                currentUtterance.onerror = () => {
                    currentUtterance = null;
                    resolve();
                };
                
                window.speechSynthesis.speak(currentUtterance);
            });
        }

        // Main Loop
        async function startAuto() {
            if (isPlaying || availableNumbers.length === 0) return;
            isPlaying = true;
            updateUI();

            // Wake up speech engine (browser requirement)
            if ('speechSynthesis' in window) {
                window.speechSynthesis.resume();
            }

            while (isPlaying && availableNumbers.length > 0) {
                // Randomly pick a number
                const randIndex = Math.floor(Math.random() * availableNumbers.length);
                const num = availableNumbers.splice(randIndex, 1)[0];
                calledNumbers.push(num);

                // Update UI state inside loop so buttons like Bingo become active
                updateCounter();
                updateUI();

                // Update Display
                document.getElementById('current-number').innerText = num;
                const cell = document.getElementById(`cell-${num}`);
                if (cell) cell.classList.add('called');

                // Prepare Thai Speech
                const thaiWord = numberToThai(num);
                const textToSpeak = `เลข ${thaiWord} ... ย้ำอีกครั้ง เลข ${thaiWord}`; 

                // Speak and await completion
                await speak(textToSpeak, currentSpeed.rate);

                // Check if stopped during speech
                if (!isPlaying) break;

                // Wait based on speed setting
                await sleep(currentSpeed.delay);
            }

            // End of game
            if (availableNumbers.length === 0) {
                isPlaying = false;
                document.getElementById('current-number').innerText = "จบเกม";
                await speak("จบเกมบิงโกแล้วครับ", currentSpeed.rate);
            }
            updateUI();
        }

        // Stop functionality
        function stopBingo() {
            isPlaying = false;
            if ('speechSynthesis' in window) {
                window.speechSynthesis.cancel();
            }
            cancelSleep();
            updateUI();
        }

        // Reset functionality
        function resetBingo() {
            stopBingo();
            availableNumbers = Array.from({length: MAX_NUMBER}, (_, i) => i + 1);
            calledNumbers = [];
            document.getElementById('current-number').innerText = "-";
            updateCounter();
            renderGrid();
            updateUI();
        }

        // Announce Bingo functionality
        async function announceBingo() {
            stopBingo();
            document.getElementById('current-number').innerText = "บิงโก!";
            document.getElementById('display-card').classList.add('active');
            await speak("บิงโก! บิงโก! มีผู้ชนะแล้วครับ", currentSpeed.rate);
        }

        // Fullscreen Toggle
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable fullscreen: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Start initialization on window load
        window.onload = init;
    </script>
</body>
</html>
